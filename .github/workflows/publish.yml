name: Release & Publish

on:
  # Trigger on version tags pushed to master
  push:
    tags:
      - "v*"

  # Manual trigger for ad-hoc releases
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type (ignored if 'Use package.json version' is checked)"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - premajor
          - preminor
          - prepatch
          - prerelease
      use-disk-version:
        description: "Use version already in package.json (skip version bump)"
        required: false
        type: boolean
        default: false
      preid:
        description: "Prerelease identifier (e.g., beta, alpha). Only used with pre* version types."
        required: false
        type: string
        default: ""
      dry-run:
        description: "Dry run (preview only, no publish, no git changes)"
        required: false
        type: boolean
        default: false
      first-release:
        description: "First release (skip existing version/tag checks)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Gate: run CI checks before publishing
  # ──────────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────────────────────────
  # Publish packages to npm and create GitHub Release
  # ──────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx nx run-many --target=build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Tag-triggered release (reads version from package.json) ──
      - name: Extract version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: tag-version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          CORE_VERSION=$(node -p "require('./remyx-core/package.json').version")
          REACT_VERSION=$(node -p "require('./remyx-react/package.json').version")
          CLI_VERSION=$(node -p "require('./create-remyx/package.json').version")
          echo "core=$CORE_VERSION" >> "$GITHUB_OUTPUT"
          echo "react=$REACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "cli=$CLI_VERSION" >> "$GITHUB_OUTPUT"

          echo "### Package Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| @remyxjs/core | $CORE_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| @remyxjs/react | $REACT_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| create-remyx | $CLI_VERSION |" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish from tag (version already set)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Manual dispatch: use disk version ──
      - name: Publish from package.json version (manual, disk version)
        if: >-
          github.event_name == 'workflow_dispatch'
          && inputs.use-disk-version == true
          && inputs.dry-run != true
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish from package.json version — dry run (manual, disk version)
        if: >-
          github.event_name == 'workflow_dispatch'
          && inputs.use-disk-version == true
          && inputs.dry-run == true
        run: npx nx release publish --dry-run --verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Manual dispatch: bump version then publish ──
      - name: Release — dry run (manual, version bump)
        if: >-
          github.event_name == 'workflow_dispatch'
          && inputs.use-disk-version != true
          && inputs.dry-run == true
        run: |
          FLAGS="${{ inputs.version }}"
          if [ -n "${{ inputs.preid }}" ]; then
            FLAGS="$FLAGS --preid=${{ inputs.preid }}"
          fi
          if [ "${{ inputs.first-release }}" == "true" ]; then
            FLAGS="$FLAGS --first-release"
          fi
          npx nx release $FLAGS --dry-run --verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (manual, version bump)
        if: >-
          github.event_name == 'workflow_dispatch'
          && inputs.use-disk-version != true
          && inputs.dry-run != true
        run: |
          FLAGS="${{ inputs.version }} --yes"
          if [ -n "${{ inputs.preid }}" ]; then
            FLAGS="$FLAGS --preid=${{ inputs.preid }}"
          fi
          if [ "${{ inputs.first-release }}" == "true" ]; then
            FLAGS="$FLAGS --first-release"
          fi
          npx nx release $FLAGS
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Read final versions and write summary ──
      - name: Write publish summary
        if: inputs.dry-run != true
        run: |
          CORE_VERSION=$(node -p "require('./remyx-core/package.json').version")
          REACT_VERSION=$(node -p "require('./remyx-react/package.json').version")
          CLI_VERSION=$(node -p "require('./create-remyx/package.json').version")

          echo "### Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version | Link |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@remyxjs/core\` | $CORE_VERSION | [npm](https://www.npmjs.com/package/@remyxjs/core) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`@remyxjs/react\` | $REACT_VERSION | [npm](https://www.npmjs.com/package/@remyxjs/react) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`create-remyx\` | $CLI_VERSION | [npm](https://www.npmjs.com/package/create-remyx) |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────
  # Create GitHub Release (tag-triggered only)
  # ──────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract version and build release notes
        id: release-info
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          CORE_VERSION=$(node -p "require('./remyx-core/package.json').version")
          REACT_VERSION=$(node -p "require('./remyx-react/package.json').version")
          CLI_VERSION=$(node -p "require('./create-remyx/package.json').version")

          IS_PRERELEASE=false
          if echo "$TAG" | grep -qE '(alpha|beta|rc|next|canary)'; then
            IS_PRERELEASE=true
          fi
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          cat > /tmp/release-notes.md << 'NOTES'
          ## Packages

          | Package | Version | Install |
          | --- | --- | --- |
          NOTES

          echo "| \`@remyxjs/core\` | $CORE_VERSION | \`npm i @remyxjs/core@$CORE_VERSION\` |" >> /tmp/release-notes.md
          echo "| \`@remyxjs/react\` | $REACT_VERSION | \`npm i @remyxjs/react@$REACT_VERSION\` |" >> /tmp/release-notes.md
          echo "| \`create-remyx\` | $CLI_VERSION | \`npx create-remyx-app@$CLI_VERSION\` |" >> /tmp/release-notes.md

          cat >> /tmp/release-notes.md << 'NOTES'

          ## Quick Start

          ```bash
          # New project
          npx create-remyx-app my-editor

          # Existing React project
          npm install @remyxjs/core @remyxjs/react
          ```

          ## Links

          - [Changelog](https://github.com/SmashJaw/remyx-editor/blob/master/docs/CHANGELOG.md)
          - [@remyxjs/core on npm](https://www.npmjs.com/package/@remyxjs/core)
          - [@remyxjs/react on npm](https://www.npmjs.com/package/@remyxjs/react)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Remyx Editor ${{ steps.release-info.outputs.version }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ steps.release-info.outputs.prerelease }}
          generate_release_notes: true
          make_latest: ${{ steps.release-info.outputs.prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
