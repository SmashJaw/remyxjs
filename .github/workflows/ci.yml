name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build:all

      - name: Verify @remyxjs/core dist
        run: |
          test -f packages/remyx-core/dist/remyx-core.js
          test -f packages/remyx-core/dist/remyx-core.cjs
          test -f packages/remyx-core/dist/style.css

      - name: Verify @remyxjs/react dist
        run: |
          test -f packages/remyx-react/dist/remyx-react.js
          test -f packages/remyx-react/dist/remyx-react.cjs
          test -f packages/remyx-react/dist/style.css

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/remyx-core/dist/
            packages/remyx-react/dist/
          retention-days: 7

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test -- --ci --forceExit

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage -- --ci --forceExit

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  package-check:
    name: Package Integrity
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build:all

      - name: Dry-run pack @remyxjs/core
        working-directory: packages/remyx-core
        run: npm pack --dry-run 2>&1 | tee /tmp/core-pack.txt

      - name: Dry-run pack @remyxjs/react
        working-directory: packages/remyx-react
        run: npm pack --dry-run 2>&1 | tee /tmp/react-pack.txt

      - name: Dry-run pack create-remyx
        working-directory: packages/create-remyx
        run: npm pack --dry-run 2>&1 | tee /tmp/create-pack.txt

      - name: Verify no secrets in packages
        run: |
          for dir in packages/remyx-core packages/remyx-react packages/create-remyx; do
            echo "Checking $dir..."
            if grep -rn "PRIVATE\|SECRET\|PASSWORD\|_KEY=" "$dir/dist/" 2>/dev/null || \
               grep -rn "PRIVATE\|SECRET\|PASSWORD\|_KEY=" "$dir/create/" 2>/dev/null; then
              echo "::error::Potential secret found in $dir"
              exit 1
            fi
          done
          echo "No secrets detected."
